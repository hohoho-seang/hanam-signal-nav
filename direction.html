<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
  <title>신호 예측 보행 내비게이션</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
  <script src="config.js"></script>
  <script src="signal.js"></script>
  <style>
    html, body { margin: 0; height: 100%; font-family: sans-serif; }
    #layout { display: flex; height: 100%; }
    #stage { position: relative; flex: 1; height: 100%; background: #111; }
    #view2d, #view3d { width: 100%; height: 100%; }
    #stage > div.pip-main { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 1; }
    #stage > div.pip-mini {
      position: absolute; width: 170px; height: 130px; bottom: 14px; right: 14px; z-index: 20;
      border: 3px solid #fff; border-radius: 10px; box-shadow: 0 2px 10px rgba(0,0,0,.35);
      cursor: pointer; overflow: hidden;
    }
    .hud {
      position: absolute; top: 12px; left: 12px; z-index: 15;
      background: rgba(0,0,0,.65); color: #fff; padding: 8px 12px; border-radius: 8px;
      font-size: 13px; line-height: 1.5; max-width: 260px; display: none;
    }
    .hud-msg {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 15;
      background: rgba(0,0,0,.7); color: #fff; padding: 10px 16px; border-radius: 8px;
      font-size: 13px; display: none; text-align: center;
    }
    #panel { width: 300px; padding: 10px; box-sizing: border-box; overflow-y: auto; font-size: 13px; border-left: 1px solid #ddd; }
    #panel h3 { margin: 4px 0; font-size: 14px; }
    #panel button { padding: 6px 10px; margin: 3px 3px 3px 0; cursor: pointer; }
    #panel input[type=number] { width: 60px; }
    .hint { color: #666; font-size: 12px; margin: 6px 0; }
    .summary { background: #f4f6f8; padding: 8px; border-radius: 6px; margin: 8px 0; }
    .sig-item { border-left: 4px solid #999; padding: 4px 6px; margin: 4px 0; background: #fafafa; }
    .sig-item.green { border-color: #1a9c1a; }
    .sig-item.red { border-color: #d92b2b; }
    .sig-item .badge { font-size: 10px; color: #fff; padding: 0 5px; border-radius: 6px; }
    .badge.calibrated { background: #1a73e8; }
    .badge.estimated { background: #999; }
    @media (max-width: 700px) {
      #layout { flex-direction: column; }
      #panel { width: 100%; height: 45%; order: 2; }
      #stage { height: 55%; order: 1; }
    }
  </style>
</head>
<body>
  <div id="layout">
    <div id="stage">
      <div id="view3d" class="pip-main"></div>
      <div id="view2d" class="pip-mini"></div>
      <div id="navHud" class="hud"></div>
      <div id="roadviewMsg" class="hud-msg"></div>
    </div>
    <div id="panel">
      <h3>보행 내비게이션</h3>
      <div class="hint">지도를 클릭해 <b>출발지</b>를 먼저 찍고, 다시 클릭해 <b>도착지</b>를 찍으세요. (작은 박스를 누르면 3D/2D가 서로 바뀝니다)</div>
      <div>
        <button id="useMyLocBtn">내 위치를 출발지로</button>
        <button id="resetBtn">초기화</button>
      </div>
      <div style="margin-top:8px;">
        도보속도: <input id="walkSpeed" type="number" step="0.1" value="1.2"> m/s
        (보통 성인 약 1.2, 노약자 약 1.0)
      </div>
      <div style="margin-top:8px;">
        <button id="startNavBtn">🧭 내비게이션 시작</button>
        <button id="stopNavBtn" style="display:none;">⏹ 내비게이션 종료</button>
      </div>
      <div id="status" class="hint"></div>
      <div id="summary"></div>
      <div id="signalList"></div>
    </div>
  </div>

  <script>
    const view2dEl = document.getElementById('view2d');
    const view3dEl = document.getElementById('view3d');
    const hudEl = document.getElementById('navHud');
    const roadviewMsgEl = document.getElementById('roadviewMsg');

    const map = L.map(view2dEl).setView([37.5380, 127.2046], 16);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 19
    }).addTo(map);

    const blueIcon = L.icon({ iconUrl: "https://maps.gstatic.com/mapfiles/ms2/micons/blue-dot.png", iconSize: [24, 24], iconAnchor: [12, 12] });

    let start = null, goal = null;
    let startMarker = null, goalMarker = null;
    let routePolyline = null;
    let signalMarkers = [];
    let signals = [];
    let calibrations = loadCalibrations(); // 로컬 캐시(Firebase 설정 시 실시간 동기화로 갱신됨)

    // 내비게이션 진행중 상태
    let currentRoutePoints = [];
    let currentMatchedSignals = [];
    let watchId = null;
    let roadview = null;
    let roadviewClient = null;

    function toRad(d) { return d * Math.PI / 180; }
    function haversine(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat / 2) ** 2 +
                Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
      return 2 * R * Math.asin(Math.sqrt(a));
    }
    function bearingTo(lat1, lon1, lat2, lon2) {
      const φ1 = toRad(lat1), φ2 = toRad(lat2), Δλ = toRad(lon2 - lon1);
      const y = Math.sin(Δλ) * Math.cos(φ2);
      const x = Math.cos(φ1) * Math.sin(φ2) - Math.sin(φ1) * Math.cos(φ2) * Math.cos(Δλ);
      return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
    }

    // ---- PiP(3D 메인 / 2D 미니, 클릭시 교체) ----
    function swapPiP() {
      const view3dWasMain = view3dEl.classList.contains('pip-main');
      view3dEl.classList.toggle('pip-main', !view3dWasMain);
      view3dEl.classList.toggle('pip-mini', view3dWasMain);
      view2dEl.classList.toggle('pip-main', view3dWasMain);
      view2dEl.classList.toggle('pip-mini', !view3dWasMain);
      setTimeout(() => {
        map.invalidateSize();
        if (roadview) roadview.relayout();
      }, 30);
    }
    view3dEl.addEventListener('click', () => { if (view3dEl.classList.contains('pip-mini')) swapPiP(); });

    // ---- Kakao 로드뷰 (실사진 3D). 키 미설정시 조용히 비활성화 ----
    function loadKakaoSdk(onReady) {
      if (typeof KAKAO_JS_KEY === 'undefined' || !KAKAO_JS_KEY || KAKAO_JS_KEY.startsWith('YOUR_')) {
        console.warn('Kakao 키 미설정 — 3D 로드뷰 비활성화(2D만 사용 가능)');
        return;
      }
      const script = document.createElement('script');
      script.src = `https://dapi.kakao.com/v2/maps/sdk.js?appkey=${KAKAO_JS_KEY}&autoload=false&libraries=services`;
      script.onload = () => kakao.maps.load(onReady);
      script.onerror = () => console.error('Kakao SDK 로드 실패');
      document.head.appendChild(script);
    }
    loadKakaoSdk(() => {
      roadview = new kakao.maps.Roadview(view3dEl);
      roadviewClient = new kakao.maps.RoadviewClient();
    });

    async function loadData() {
      const signalsRes = await fetch("signals.json", { cache: "no-cache" });
      signals = signalsRes.ok ? await signalsRes.json() : [];
    }

    map.on('click', (e) => {
      if (view2dEl.classList.contains('pip-mini')) { swapPiP(); return; }
      const latlng = e.latlng;
      if (!start) {
        start = latlng;
        if (startMarker) map.removeLayer(startMarker);
        startMarker = L.marker(latlng, { icon: blueIcon, title: "출발" }).addTo(map);
        setStatus("도착지를 클릭하세요.");
      } else if (!goal) {
        goal = latlng;
        if (goalMarker) map.removeLayer(goalMarker);
        goalMarker = L.marker(latlng, { title: "도착" }).addTo(map);
        findRoute();
      } else {
        clearRoute();
        start = latlng;
        if (startMarker) map.removeLayer(startMarker);
        startMarker = L.marker(latlng, { icon: blueIcon, title: "출발" }).addTo(map);
        goal = null;
        setStatus("도착지를 클릭하세요.");
      }
    });

    document.getElementById("useMyLocBtn").addEventListener("click", () => {
      if (!navigator.geolocation) { alert("위치 정보를 사용할 수 없습니다."); return; }
      navigator.geolocation.getCurrentPosition(pos => {
        const latlng = L.latLng(pos.coords.latitude, pos.coords.longitude);
        start = latlng;
        if (startMarker) map.removeLayer(startMarker);
        startMarker = L.marker(latlng, { icon: blueIcon, title: "출발" }).addTo(map);
        map.setView(latlng);
        setStatus("도착지를 클릭하세요.");
      }, () => alert("위치를 가져오지 못했습니다."));
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
      stopNav();
      clearRoute();
      start = null; goal = null;
      if (startMarker) map.removeLayer(startMarker);
      if (goalMarker) map.removeLayer(goalMarker);
      startMarker = null; goalMarker = null;
      setStatus("출발지를 클릭하세요.");
      document.getElementById("summary").innerHTML = "";
      document.getElementById("signalList").innerHTML = "";
    });

    document.getElementById("startNavBtn").addEventListener("click", startNav);
    document.getElementById("stopNavBtn").addEventListener("click", stopNav);

    function clearRoute() {
      if (routePolyline) { map.removeLayer(routePolyline); routePolyline = null; }
      signalMarkers.forEach(m => map.removeLayer(m));
      signalMarkers = [];
      currentRoutePoints = [];
      currentMatchedSignals = [];
    }

    function setStatus(msg) {
      document.getElementById("status").textContent = msg;
    }

    async function findRoute() {
      clearRoute();
      setStatus("경로 탐색 중...");
      try {
        const res = await fetch("https://apis.openapi.sk.com/tmap/routes/pedestrian?version=1", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json",
            "appKey": TMAP_APP_KEY,
          },
          body: JSON.stringify({
            startX: String(start.lng), startY: String(start.lat),
            endX: String(goal.lng), endY: String(goal.lat),
            startName: "출발지", endName: "도착지",
            reqCoordType: "WGS84GEO", resCoordType: "WGS84GEO",
            searchOption: "0",
          }),
        });
        const data = await res.json();
        if (!res.ok || !data.features) {
          setStatus("경로를 찾지 못했습니다: " + (data.error?.message || JSON.stringify(data)));
          return;
        }
        renderRoute(data);
      } catch (e) {
        console.error(e);
        setStatus("경로 탐색 실패 (네트워크 오류)");
      }
    }

    // Tmap GeoJSON -> [{lat, lng, cumDist}] 좌표열 생성
    function buildRoutePoints(geojson) {
      const coords = []; // [lng, lat]
      geojson.features.forEach(f => {
        if (f.geometry && f.geometry.type === "LineString") {
          f.geometry.coordinates.forEach(c => coords.push(c));
        }
      });
      const points = [];
      let cumDist = 0;
      coords.forEach((c, i) => {
        const [lng, lat] = c;
        if (i > 0) {
          const prev = coords[i - 1];
          cumDist += haversine(prev[1], prev[0], lat, lng);
        }
        points.push({ lat, lng, cumDist });
      });
      return points;
    }

    function matchSignalsToRoute(routePoints, thresholdMeters) {
      const matched = [];
      signals.forEach(sig => {
        let best = null;
        routePoints.forEach(p => {
          const d = haversine(sig.lat, sig.lng, p.lat, p.lng);
          if (!best || d < best.dist) best = { dist: d, cumDist: p.cumDist };
        });
        if (best && best.dist <= thresholdMeters) {
          matched.push({ sig, cumDist: best.cumDist, dist: best.dist });
        }
      });
      matched.sort((a, b) => a.cumDist - b.cumDist);
      const dedup = [];
      matched.forEach(m => {
        const dup = dedup.find(d => haversine(d.sig.lat, d.sig.lng, m.sig.lat, m.sig.lng) < 15);
        if (!dup) dedup.push(m);
      });
      return dedup;
    }

    function renderRoute(geojson) {
      const routePoints = buildRoutePoints(geojson);
      if (routePoints.length === 0) { setStatus("경로 좌표가 비어 있습니다."); return; }
      currentRoutePoints = routePoints;

      const path = routePoints.map(p => [p.lat, p.lng]);
      routePolyline = L.polyline(path, { color: '#1a73e8', opacity: 0.85, weight: 5 }).addTo(map);
      map.fitBounds(routePolyline.getBounds());

      const totalDistance = routePoints[routePoints.length - 1].cumDist;
      const walkSpeed = Math.max(0.3, Number(document.getElementById("walkSpeed").value) || 1.2);
      const totalWalkTime = totalDistance / walkSpeed;

      const matched = matchSignalsToRoute(routePoints, 40);
      currentMatchedSignals = matched;
      const now = new Date();
      let extraDelay = 0;
      matched.forEach(m => {
        const walkTimeToHere = m.cumDist / walkSpeed;
        const arrivalTime = new Date(now.getTime() + (walkTimeToHere + extraDelay) * 1000);
        const predicted = getSignalState(m.sig.cycle, calibrations[m.sig.id], arrivalTime);
        if (predicted.state === "빨강") {
          extraDelay += predicted.remaining;
        }
        m.predicted = predicted;
        m.arrivalTime = arrivalTime;

        const icon = predicted.state === "초록"
          ? "https://maps.gstatic.com/mapfiles/ms2/micons/green-dot.png"
          : "https://maps.gstatic.com/mapfiles/ms2/micons/red-dot.png";
        const marker = L.marker([m.sig.lat, m.sig.lng], {
          icon: L.icon({ iconUrl: icon, iconSize: [20, 20], iconAnchor: [10, 10] }),
          title: m.sig.name
        }).addTo(map);
        signalMarkers.push(marker);
      });

      const totalETA = totalWalkTime + extraDelay;
      document.getElementById("summary").innerHTML = `
        <div class="summary">
          총 거리: ${Math.round(totalDistance)}m<br>
          도보 시간: ${Math.round(totalWalkTime / 60)}분<br>
          예상 신호대기: ${Math.round(extraDelay)}초<br>
          <b>총 예상 소요시간: ${Math.round(totalETA / 60)}분 ${Math.round(totalETA % 60)}초</b>
        </div>
      `;

      document.getElementById("signalList").innerHTML =
        `<h3>경로상 신호 (${matched.length}개)</h3>` +
        matched.map(m => {
          const cls = m.predicted.state === "초록" ? "green" : "red";
          const badgeCls = m.predicted.source === "calibrated" ? "calibrated" : "estimated";
          const badgeLabel = m.predicted.source === "calibrated" ? "실측" : "추정";
          const etaMin = Math.round(m.cumDist / walkSpeed / 60 * 10) / 10;
          return `
            <div class="sig-item ${cls}">
              <b>${m.sig.name}</b> <span class="badge ${badgeCls}">${badgeLabel}</span><br>
              도착 예상: ${etaMin}분 후<br>
              예측 신호: <b style="color:${cls === 'green' ? 'green' : 'red'}">${m.predicted.state}</b>
              (${m.predicted.remaining}초 남음)
            </div>
          `;
        }).join("");

      if (matched.length === 0) {
        setStatus("경로 완성 (경로 40m 이내 신호 데이터 없음)");
      } else {
        setStatus("경로 완성");
      }
    }

    // ---- 실시간 내비게이션(GPS로 로드뷰 추적 + 다음 신호 잔여시간 HUD) ----
    function nearestRouteProgress(lat, lng) {
      let best = null;
      currentRoutePoints.forEach((p, i) => {
        const d = haversine(lat, lng, p.lat, p.lng);
        if (!best || d < best.dist) best = { dist: d, cumDist: p.cumDist, index: i };
      });
      return best;
    }

    function startNav() {
      if (!navigator.geolocation) { alert("위치 정보를 사용할 수 없습니다."); return; }
      if (currentRoutePoints.length === 0) { alert("먼저 지도를 클릭해 경로를 탐색하세요."); return; }
      document.getElementById("startNavBtn").style.display = "none";
      document.getElementById("stopNavBtn").style.display = "inline-block";
      hudEl.style.display = "block";
      if (!view3dEl.classList.contains('pip-main')) swapPiP();
      watchId = navigator.geolocation.watchPosition(onNavPosition, err => {
        console.error("GPS 오류:", err);
      }, { enableHighAccuracy: true });
    }

    function stopNav() {
      if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
      document.getElementById("startNavBtn").style.display = "inline-block";
      document.getElementById("stopNavBtn").style.display = "none";
      hudEl.style.display = "none";
      roadviewMsgEl.style.display = "none";
    }

    function onNavPosition(pos) {
      const { latitude: lat, longitude: lng } = pos.coords;
      const progress = nearestRouteProgress(lat, lng);
      if (!progress) return;

      // 다음 신호 잔여시간 HUD
      const upcoming = currentMatchedSignals.find(m => m.cumDist > progress.cumDist);
      if (upcoming) {
        const live = getSignalState(upcoming.sig.cycle, calibrations[upcoming.sig.id], new Date());
        hudEl.innerHTML = `<b>${upcoming.sig.name}</b><br>남은 거리: ${Math.round(upcoming.cumDist - progress.cumDist)}m<br>
          현재 신호: <span style="color:${live.state==='초록' ? '#4caf50' : '#f44336'}">${live.state}</span> (${live.remaining}초)`;
      } else {
        hudEl.innerHTML = "앞에 남은 신호 없음";
      }

      // 로드뷰 위치/방향 갱신
      if (!roadview || !roadviewClient) return;
      const kakaoPos = new kakao.maps.LatLng(lat, lng);
      roadviewClient.getNearestPanoId(kakaoPos, 50, panoId => {
        if (!panoId) {
          roadviewMsgEl.textContent = "이 구간은 로드뷰 데이터가 없습니다.";
          roadviewMsgEl.style.display = "block";
          return;
        }
        roadviewMsgEl.style.display = "none";
        const lookIdx = Math.min(progress.index + 3, currentRoutePoints.length - 1);
        const next = currentRoutePoints[lookIdx];
        const heading = bearingTo(lat, lng, next.lat, next.lng);
        roadview.setPanoId(panoId, kakaoPos);
        roadview.setViewpoint({ pan: heading, tilt: 0, zoom: 0 });
      });
    }

    loadData().then(() => {
      setStatus("출발지를 클릭하세요.");
      initCalibrationSync(remote => { calibrations = remote; });
    });
  </script>
</body>
</html>
