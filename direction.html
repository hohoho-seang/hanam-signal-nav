<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
  <title>신호 예측 보행 내비게이션</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/three@0.149.0/build/three.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
  <script src="config.js"></script>
  <script src="signal.js"></script>
  <style>
    html, body { margin: 0; height: 100%; font-family: sans-serif; }
    #layout { display: flex; height: 100%; }
    #stage { position: relative; flex: 1; height: 100%; background: #111; }
    #view2d, #view3d { width: 100%; height: 100%; }
    #view3d { position: relative; overflow: hidden; }
    #view3d video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; display: none; }
    #view3d canvas { position: absolute; top: 0; left: 0; }
    #stage > div.pip-main { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 1; }
    #stage > div.pip-mini {
      position: absolute; width: 170px; height: 130px; bottom: 14px; right: 14px; z-index: 20;
      border: 3px solid #fff; border-radius: 10px; box-shadow: 0 2px 10px rgba(0,0,0,.35);
      cursor: pointer; overflow: hidden;
    }
    .hud {
      position: absolute; top: 12px; left: 12px; z-index: 15;
      background: rgba(0,0,0,.65); color: #fff; padding: 8px 12px; border-radius: 8px;
      font-size: 13px; line-height: 1.5; max-width: 260px; display: none;
    }
    .hud-msg {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 15;
      background: rgba(0,0,0,.7); color: #fff; padding: 10px 16px; border-radius: 8px;
      font-size: 13px; display: none; text-align: center;
    }
    #panel { width: 300px; padding: 10px; box-sizing: border-box; overflow-y: auto; font-size: 13px; border-left: 1px solid #ddd; }
    #panel h3 { margin: 4px 0; font-size: 14px; }
    #panel button { padding: 6px 10px; margin: 3px 3px 3px 0; cursor: pointer; }
    #panel input[type=number] { width: 60px; }
    #panel input[type=text] { width: 100%; box-sizing: border-box; padding: 7px 8px; font-size: 13px; border: 1px solid #ccc; border-radius: 6px; }
    .hint { color: #666; font-size: 12px; margin: 6px 0; }
    .suggestions {
      display: none; position: absolute; top: 100%; left: 0; right: 0; z-index: 50; margin-top: 2px;
      background: #fff; border: 1px solid #ddd; border-radius: 6px; max-height: 220px; overflow-y: auto;
      box-shadow: 0 4px 10px rgba(0,0,0,.15);
    }
    .sugg-item { padding: 8px 10px; cursor: pointer; border-bottom: 1px solid #f0f0f0; }
    .sugg-item:hover { background: #f4f6f8; }
    .sugg-addr { color: #777; font-size: 11px; }
    .sugg-empty { padding: 8px 10px; color: #999; font-size: 12px; }
    .summary { background: #f4f6f8; padding: 8px; border-radius: 6px; margin: 8px 0; }
    .sig-item { border-left: 4px solid #999; padding: 4px 6px; margin: 4px 0; background: #fafafa; }
    .sig-item.green { border-color: #1a9c1a; }
    .sig-item.red { border-color: #d92b2b; }
    .sig-item .badge { font-size: 10px; color: #fff; padding: 0 5px; border-radius: 6px; }
    .badge.calibrated { background: #1a73e8; }
    .badge.estimated { background: #999; }
    @media (max-width: 700px) {
      #layout { flex-direction: column; }
      #panel { width: 100%; height: 45%; order: 2; }
      #stage { height: 55%; order: 1; }
    }
  </style>
</head>
<body>
  <div id="layout">
    <div id="stage">
      <div id="view3d" class="pip-main">
        <video id="arVideo" autoplay muted playsinline></video>
      </div>
      <div id="view2d" class="pip-mini"></div>
      <div id="navHud" class="hud"></div>
      <div id="sceneMsg" class="hud-msg"></div>
    </div>
    <div id="panel">
      <h3>보행 내비게이션</h3>
      <div class="hint">출발지/도착지를 검색하거나, 지도를 클릭해서 찍을 수도 있습니다. (작은 박스를 누르면 3D/2D가 서로 바뀝니다)</div>
      <div style="position:relative; margin-top:6px;">
        <input id="startInput" type="text" placeholder="출발지 검색 (예: 남한고등학교)" autocomplete="off">
        <div id="startSuggestions" class="suggestions"></div>
      </div>
      <div style="position:relative; margin-top:4px;">
        <input id="goalInput" type="text" placeholder="도착지 검색" autocomplete="off">
        <div id="goalSuggestions" class="suggestions"></div>
      </div>
      <div style="margin-top:6px;">
        <button id="useMyLocBtn">내 위치를 출발지로</button>
        <button id="resetBtn">초기화</button>
      </div>
      <div style="margin-top:8px;">
        도보속도: <input id="walkSpeed" type="number" step="0.1" value="1.2"> m/s
        (보통 성인 약 1.2, 노약자 약 1.0)
      </div>
      <div style="margin-top:8px;">
        <button id="startNavBtn">🧭 내비게이션 시작(GPS)</button>
        <button id="stopNavBtn" style="display:none;">⏹ 내비게이션 종료</button>
      </div>
      <div style="margin-top:4px;">
        <button id="previewBtn">▶ 3D 미리보기(자동재생, 테스트용)</button>
      </div>
      <div style="margin-top:4px;">
        <button id="arBtn">📷 AR 모드 시작</button>
        <button id="arStopBtn" style="display:none;">⏹ AR 모드 종료</button>
      </div>
      <div class="hint">AR은 카메라·방향센서 권한이 필요합니다. 실제 걷는 방향(나침반)과 GPS 위치로 화면에 경로/신호를 겹쳐 보여줍니다 — 정밀 공간추적(SLAM)은 아니라 오차가 있을 수 있습니다.</div>
      <div id="status" class="hint"></div>
      <div id="summary"></div>
      <div id="signalList"></div>
    </div>
  </div>

  <script>
    const view2dEl = document.getElementById('view2d');
    const view3dEl = document.getElementById('view3d');
    const hudEl = document.getElementById('navHud');
    const sceneMsgEl = document.getElementById('sceneMsg');
    const HUD_TRIGGER_RADIUS = 60; // 다음 신호까지 이 거리(m) 이내로 들어오면 HUD 자동 표시
    const EYE_HEIGHT = 1.6;

    const map = L.map(view2dEl).setView([37.5380, 127.2046], 16);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 19
    }).addTo(map);

    const blueIcon = L.icon({ iconUrl: "https://maps.gstatic.com/mapfiles/ms2/micons/blue-dot.png", iconSize: [24, 24], iconAnchor: [12, 12] });

    let start = null, goal = null;
    let startMarker = null, goalMarker = null;
    let routePolyline = null;
    let signalMarkers = [];
    let signals = [];
    let calibrations = loadCalibrations(); // 로컬 캐시(Firebase 설정 시 실시간 동기화로 갱신됨)

    let currentRoutePoints = [];
    let currentMatchedSignals = [];
    let watchId = null;
    let arMode = false;
    let arStream = null;
    let compassHandler = null;

    function toRad(d) { return d * Math.PI / 180; }
    function haversine(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat / 2) ** 2 +
                Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
      return 2 * R * Math.asin(Math.sqrt(a));
    }

    // ---- PiP(3D 메인 / 2D 미니, 클릭시 교체) ----
    function swapPiP() {
      const view3dWasMain = view3dEl.classList.contains('pip-main');
      view3dEl.classList.toggle('pip-main', !view3dWasMain);
      view3dEl.classList.toggle('pip-mini', view3dWasMain);
      view2dEl.classList.toggle('pip-main', view3dWasMain);
      view2dEl.classList.toggle('pip-mini', !view3dWasMain);
      setTimeout(() => {
        map.invalidateSize();
        resize3d();
      }, 30);
    }
    view3dEl.addEventListener('click', () => { if (view3dEl.classList.contains('pip-mini')) swapPiP(); });

    // ================= Three.js 3D 씬 (건물 + 도로 + 경로, 카메라가 경로를 따라 이동) =================
    let scene3d, camera3d, renderer3d, buildingsGroup, roadsGroup, routeMesh3d;
    let originLat = null, originLng = null;
    let signalMarkers3d = []; // { sig, mesh }
    let navMode = 'idle'; // 'idle' | 'preview' | 'live'
    let progressM = 0;
    let lastFrameTs = null;
    const buildingMaterial = new THREE.MeshLambertMaterial({ color: 0xcfd8dc });
    const roadMaterial = new THREE.MeshLambertMaterial({ color: 0x4a4a4a });
    const footwayMaterial = new THREE.MeshLambertMaterial({ color: 0x9e9e9e });
    const routeMaterial = new THREE.MeshBasicMaterial({ color: 0x2979ff });

    // 도로 폭(m) 추정 — 실측 폭 데이터가 없어 highway 태그 기반 표준 추정치 사용.
    const ROAD_WIDTH_BY_TYPE = {
      motorway: 12, trunk: 11, primary: 10, secondary: 8.5, tertiary: 7,
      residential: 6, unclassified: 5.5, service: 4,
      footway: 2, path: 1.5, pedestrian: 4, cycleway: 2, steps: 1.5,
    };

    // 좌표열을 따라가는 평평한 리본(도로/경로 표시용) 지오메트리. 원기둥(Tube)과 달리
    // 바닥에 얇게 붙어서 "유저가 경로를 뚫고 지나가는" 느낌 없이 실제 도로 표시처럼 보인다.
    function buildRibbonGeometry(points3d, width) {
      const vertices = [], indices = [];
      for (let i = 0; i < points3d.length; i++) {
        const p = points3d[i];
        let dx, dz;
        if (i === 0) { dx = points3d[1].x - p.x; dz = points3d[1].z - p.z; }
        else if (i === points3d.length - 1) { dx = p.x - points3d[i - 1].x; dz = p.z - points3d[i - 1].z; }
        else { dx = points3d[i + 1].x - points3d[i - 1].x; dz = points3d[i + 1].z - points3d[i - 1].z; }
        const len = Math.hypot(dx, dz) || 1;
        const nx = -dz / len, nz = dx / len;
        vertices.push(p.x + nx * width / 2, p.y, p.z + nz * width / 2);
        vertices.push(p.x - nx * width / 2, p.y, p.z - nz * width / 2);
      }
      for (let i = 0; i < points3d.length - 1; i++) {
        const a = i * 2, b = i * 2 + 1, c = (i + 1) * 2, d = (i + 1) * 2 + 1;
        indices.push(a, c, b, b, c, d);
      }
      const geom = new THREE.BufferGeometry();
      geom.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
      geom.setIndex(indices);
      geom.computeVertexNormals();
      return geom;
    }

    function initThree() {
      scene3d = new THREE.Scene();
      scene3d.background = new THREE.Color(0x8fc7ff);
      camera3d = new THREE.PerspectiveCamera(70, 1, 0.1, 3000);
      renderer3d = new THREE.WebGLRenderer({ antialias: true, alpha: true }); // alpha: AR모드에서 카메라 영상 위에 투명 합성
      view3dEl.appendChild(renderer3d.domElement);
      resize3d();

      scene3d.add(new THREE.AmbientLight(0xffffff, 0.75));
      const sun = new THREE.DirectionalLight(0xffffff, 0.7);
      sun.position.set(150, 300, 100);
      scene3d.add(sun);

      const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(6000, 6000),
        new THREE.MeshLambertMaterial({ color: 0xb9c9a8 }) // 도로 아닌 구역(잔디/공터 근사)
      );
      ground.rotation.x = -Math.PI / 2;
      scene3d.add(ground);

      buildingsGroup = new THREE.Group();
      scene3d.add(buildingsGroup);
      roadsGroup = new THREE.Group();
      scene3d.add(roadsGroup);

      window.addEventListener('resize', resize3d);
      requestAnimationFrame(animate3d);
    }

    function resize3d() {
      if (!renderer3d) return;
      const w = Math.max(1, view3dEl.clientWidth), h = Math.max(1, view3dEl.clientHeight);
      renderer3d.setSize(w, h);
      camera3d.aspect = w / h;
      camera3d.updateProjectionMatrix();
    }

    function project(lat, lng) {
      const mPerDegLat = 110540;
      const mPerDegLng = 111320 * Math.cos(originLat * Math.PI / 180);
      return { x: (lng - originLng) * mPerDegLng, z: -(lat - originLat) * mPerDegLat };
    }

    function pointAtCumDist(cumDist) {
      const pts = currentRoutePoints;
      if (pts.length === 0) return null;
      if (cumDist <= pts[0].cumDist) return pts[0];
      for (let i = 1; i < pts.length; i++) {
        if (cumDist <= pts[i].cumDist) {
          const a = pts[i - 1], b = pts[i];
          const t = (cumDist - a.cumDist) / Math.max(1e-6, b.cumDist - a.cumDist);
          return { lat: a.lat + (b.lat - a.lat) * t, lng: a.lng + (b.lng - a.lng) * t };
        }
      }
      return pts[pts.length - 1];
    }

    function positionCameraAt(lat, lng, cumDist) {
      const p = project(lat, lng);
      camera3d.position.set(p.x, EYE_HEIGHT, p.z);
      if (!arMode) {
        // 일반 3D 모드: 항상 경로 진행방향을 바라보게 lookAt으로 시선을 고정한다.
        const endDist = currentRoutePoints[currentRoutePoints.length - 1].cumDist;
        const aheadPoint = pointAtCumDist(Math.min(cumDist + 8, endDist));
        const aim = project(aheadPoint.lat, aheadPoint.lng);
        camera3d.lookAt(aim.x, EYE_HEIGHT, aim.z);
      }
      // AR모드에서는 시선(회전)을 나침반 센서(updateCompassHeading)가 따로 담당하고
      // 여기서는 위치만 갱신한다 — 실제 폰이 보는 방향과 3D 오버레이가 맞아야 하므로.
      updateSignalHud(cumDist);
    }

    function updateSignalHud(cumDist) {
      const upcoming = currentMatchedSignals.find(m => m.cumDist > cumDist);
      if (upcoming && (upcoming.cumDist - cumDist) <= HUD_TRIGGER_RADIUS) {
        const live = getSignalState(upcoming.sig.cycle, calibrations[upcoming.sig.id], new Date());
        hudEl.style.display = "block";
        hudEl.innerHTML = `<b>${upcoming.sig.name}</b><br>남은 거리: ${Math.round(upcoming.cumDist - cumDist)}m<br>
          현재 신호: <span style="color:${live.state==='초록' ? '#4caf50' : '#f44336'}">${live.state}</span> (${live.remaining}초)`;
      } else {
        hudEl.style.display = "none";
      }
    }

    function animate3d(ts) {
      requestAnimationFrame(animate3d);
      if (navMode === 'preview' && currentRoutePoints.length > 1) {
        if (lastFrameTs != null) {
          const dt = (ts - lastFrameTs) / 1000;
          const walkSpeed = Math.max(0.3, Number(document.getElementById('walkSpeed').value) || 1.2);
          const endDist = currentRoutePoints[currentRoutePoints.length - 1].cumDist;
          progressM = Math.min(progressM + dt * walkSpeed * 4, endDist); // 시연용 4배속 자동재생
          const pt = pointAtCumDist(progressM);
          positionCameraAt(pt.lat, pt.lng, progressM);
          if (progressM >= endDist) navMode = 'idle';
        }
        lastFrameTs = ts;
      } else {
        lastFrameTs = null;
      }
      if (renderer3d) renderer3d.render(scene3d, camera3d);
    }

    function clearScene3d() {
      if (routeMesh3d) { scene3d.remove(routeMesh3d); routeMesh3d = null; }
      buildingsGroup.clear();
      roadsGroup.clear();
      signalMarkers3d.forEach(m => scene3d.remove(m.mesh));
      signalMarkers3d = [];
      navMode = 'idle';
      progressM = 0;
      sceneMsgEl.style.display = "none";
    }

    // 경로를 바닥에 붙는 얇은 리본으로 표시(도로면 y=0.05보다 약간 위 y=0.09로 겹쳐그려서
    // "페인트로 칠한 경로 표시"처럼 보이게 하고 z-fighting을 피한다).
    function buildRouteMesh3d(routePoints) {
      const pts = routePoints.map(p => {
        const { x, z } = project(p.lat, p.lng);
        return { x, y: 0.09, z };
      });
      const geom = buildRibbonGeometry(pts, 2.2);
      routeMesh3d = new THREE.Mesh(geom, routeMaterial);
      scene3d.add(routeMesh3d);
    }

    function buildSignalMarkers3d(matched) {
      matched.forEach(m => {
        const { x, z } = project(m.sig.lat, m.sig.lng);
        const geom = new THREE.CylinderGeometry(0.4, 0.4, 3, 8);
        const mesh = new THREE.Mesh(geom, new THREE.MeshLambertMaterial({ color: 0x999999 }));
        mesh.position.set(x, 1.5, z);
        scene3d.add(mesh);
        signalMarkers3d.push({ sig: m.sig, mesh });
      });
    }

    async function fetchOverpass(query) {
      // Overpass 무료 서버는 504(과부하)가 잦아 1회 재시도한다(신호정보센터 조사 때도 겪은 알려진 특성).
      for (let attempt = 0; attempt < 2; attempt++) {
        try {
          const res = await fetch('https://overpass-api.de/api/interpreter', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: 'data=' + encodeURIComponent(query)
          });
          if (!res.ok) throw new Error('overpass http ' + res.status);
          return await res.json();
        } catch (e) {
          if (attempt === 1) throw e;
          console.warn('Overpass 1차 요청 실패, 재시도:', e);
          await new Promise(r => setTimeout(r, 1500));
        }
      }
    }

    function addBuildingMesh(way) {
      const shapePts = way.geometry.map(g => {
        const { x, z } = project(g.lat, g.lon);
        return new THREE.Vector2(x, z);
      });
      const shape = new THREE.Shape(shapePts);
      const tags = way.tags || {};
      let height = 9;
      if (tags.height) height = parseFloat(tags.height) || 9;
      else if (tags['building:levels']) height = (parseFloat(tags['building:levels']) || 3) * 3;
      const geom = new THREE.ExtrudeGeometry(shape, { depth: height, bevelEnabled: false });
      geom.rotateX(-Math.PI / 2);
      buildingsGroup.add(new THREE.Mesh(geom, buildingMaterial));
    }

    function addRoadMesh(way) {
      const tags = way.tags || {};
      const isFootway = ['footway', 'path', 'pedestrian', 'cycleway', 'steps'].includes(tags.highway);
      const width = ROAD_WIDTH_BY_TYPE[tags.highway] || 5.5;
      const pts = way.geometry.map(g => {
        const { x, z } = project(g.lat, g.lon);
        return { x, y: 0.05, z };
      });
      if (pts.length < 2) return;
      const geom = buildRibbonGeometry(pts, width);
      roadsGroup.add(new THREE.Mesh(geom, isFootway ? footwayMaterial : roadMaterial));
    }

    // 건물+도로를 한 번의 Overpass 쿼리로 함께 가져온다(왕복 줄이기 = 504 위험 감소).
    async function loadEnvironmentForRoute(routePoints) {
      if (routePoints.length === 0) return;
      let minLat = 90, maxLat = -90, minLng = 180, maxLng = -180;
      routePoints.forEach(p => {
        minLat = Math.min(minLat, p.lat); maxLat = Math.max(maxLat, p.lat);
        minLng = Math.min(minLng, p.lng); maxLng = Math.max(maxLng, p.lng);
      });
      const pad = 0.0015; // 약 150m
      const bbox = [minLat - pad, minLng - pad, maxLat + pad, maxLng + pad].join(',');
      const query = `[out:json][timeout:25];(way["building"](${bbox});way["highway"](${bbox}););out geom;`;
      try {
        const data = await fetchOverpass(query);
        (data.elements || []).forEach(way => {
          if (!way.geometry || way.geometry.length < 2) return;
          const tags = way.tags || {};
          if (tags.building && way.geometry.length >= 3) addBuildingMesh(way);
          else if (tags.highway) addRoadMesh(way);
        });
      } catch (e) {
        console.warn('주변환경 데이터 로드 실패(3D 씬은 건물/도로 없이 표시됨):', e);
      }
    }

    setInterval(() => {
      signalMarkers3d.forEach(m => {
        const { state } = getSignalState(m.sig.cycle, calibrations[m.sig.id], new Date());
        m.mesh.material.color.set(state === '초록' ? 0x2ecc71 : 0xe74c3c);
      });
    }, 1000);

    // ================= 라우팅/신호 매칭 (기존 로직, 지도 라이브러리와 무관) =================

    async function loadData() {
      const signalsRes = await fetch("signals.json", { cache: "no-cache" });
      signals = signalsRes.ok ? await signalsRes.json() : [];
    }

    // ---- 출발지/도착지 설정 헬퍼(지도클릭·검색·내위치 세 경로가 전부 공유) ----
    function setStart(latlng, label) {
      start = latlng;
      if (startMarker) map.removeLayer(startMarker);
      startMarker = L.marker(latlng, { icon: blueIcon, title: "출발" }).addTo(map);
      document.getElementById("startInput").value = label;
      if (goal) findRoute();
    }

    function setGoal(latlng, label) {
      goal = latlng;
      if (goalMarker) map.removeLayer(goalMarker);
      goalMarker = L.marker(latlng, { title: "도착" }).addTo(map);
      document.getElementById("goalInput").value = label;
      if (start) findRoute();
    }

    // Tmap 역지오코딩: 좌표 -> 주소 텍스트(입력창 자동 채우기용). 실패해도 좌표로 폴백.
    async function reverseGeocode(lat, lng) {
      try {
        const res = await fetch(`https://apis.openapi.sk.com/tmap/geo/reversegeocoding?version=1&lat=${lat}&lon=${lng}&coordType=WGS84GEO&addressType=A10`, {
          headers: { appKey: TMAP_APP_KEY }
        });
        const data = await res.json();
        const full = data?.addressInfo?.fullAddress;
        if (full) return full.split(',')[0];
      } catch (e) { console.warn('역지오코딩 실패:', e); }
      return `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
    }

    map.on('click', async (e) => {
      if (view2dEl.classList.contains('pip-mini')) { swapPiP(); return; }
      const latlng = e.latlng;
      if (!start) {
        setStatus("주소 확인 중...");
        setStart(latlng, await reverseGeocode(latlng.lat, latlng.lng));
        setStatus("도착지를 클릭하세요.");
      } else if (!goal) {
        setStatus("주소 확인 중...");
        setGoal(latlng, await reverseGeocode(latlng.lat, latlng.lng));
      } else {
        clearRoute();
        goal = null;
        document.getElementById("goalInput").value = "";
        setStatus("주소 확인 중...");
        setStart(latlng, await reverseGeocode(latlng.lat, latlng.lng));
        setStatus("도착지를 클릭하세요.");
      }
    });

    // ---- 검색창 자동완성(Tmap POI 검색, 실제 존재하는 장소만 추천) ----
    function wireSearchInput(inputEl, suggestionsEl, onSelect) {
      let debounceTimer = null;
      inputEl.addEventListener('input', () => {
        clearTimeout(debounceTimer);
        const q = inputEl.value.trim();
        if (q.length < 2) { suggestionsEl.style.display = "none"; suggestionsEl.innerHTML = ""; return; }
        debounceTimer = setTimeout(() => searchPOI(q, suggestionsEl, onSelect), 300);
      });
      inputEl.addEventListener('blur', () => setTimeout(() => { suggestionsEl.style.display = "none"; }, 150));
      inputEl.addEventListener('focus', () => { if (suggestionsEl.innerHTML) suggestionsEl.style.display = "block"; });
    }

    async function searchPOI(query, suggestionsEl, onSelect) {
      try {
        const url = `https://apis.openapi.sk.com/tmap/pois?version=1&format=json&searchKeyword=${encodeURIComponent(query)}` +
          `&resCoordType=WGS84GEO&reqCoordType=WGS84GEO&count=8&centerLon=127.2046&centerLat=37.5380&radius=10`;
        const res = await fetch(url, { headers: { appKey: TMAP_APP_KEY } });
        const data = await res.json();
        let pois = data?.searchPoiInfo?.pois?.poi || [];
        if (!Array.isArray(pois)) pois = [pois]; // 결과 1개일 때 배열이 아니라 객체로 오는 Tmap API 특성 보정
        if (pois.length === 0) {
          suggestionsEl.innerHTML = '<div class="sugg-empty">검색 결과가 없습니다</div>';
          suggestionsEl.style.display = "block";
          return;
        }
        suggestionsEl.innerHTML = pois.map((p, i) => {
          const addr = p.newAddressList?.newAddress?.[0]?.fullAddressRoad
            || `${p.upperAddrName || ''} ${p.middleAddrName || ''} ${p.lowerAddrName || ''}`.trim();
          return `<div class="sugg-item" data-idx="${i}"><b>${p.name}</b><br><span class="sugg-addr">${addr}</span></div>`;
        }).join("");
        suggestionsEl.style.display = "block";
        Array.from(suggestionsEl.children).forEach((el, i) => {
          el.addEventListener('mousedown', (ev) => { // blur보다 먼저 처리되도록 mousedown 사용
            ev.preventDefault();
            const p = pois[i];
            const lat = parseFloat(p.noorLat || p.frontLat);
            const lng = parseFloat(p.noorLon || p.frontLon);
            onSelect(L.latLng(lat, lng), p.name);
            suggestionsEl.style.display = "none";
          });
        });
      } catch (e) {
        console.error('POI 검색 실패:', e);
      }
    }

    wireSearchInput(document.getElementById("startInput"), document.getElementById("startSuggestions"), setStart);
    wireSearchInput(document.getElementById("goalInput"), document.getElementById("goalSuggestions"), setGoal);

    document.getElementById("useMyLocBtn").addEventListener("click", () => {
      if (!navigator.geolocation) { alert("위치 정보를 사용할 수 없습니다."); return; }
      navigator.geolocation.getCurrentPosition(async pos => {
        const latlng = L.latLng(pos.coords.latitude, pos.coords.longitude);
        setStatus("주소 확인 중...");
        setStart(latlng, await reverseGeocode(latlng.lat, latlng.lng));
        map.setView(latlng);
        setStatus("도착지를 클릭하세요.");
      }, () => alert("위치를 가져오지 못했습니다."));
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
      if (arMode) stopAR();
      stopNav();
      clearRoute();
      start = null; goal = null;
      if (startMarker) map.removeLayer(startMarker);
      if (goalMarker) map.removeLayer(goalMarker);
      startMarker = null; goalMarker = null;
      document.getElementById("startInput").value = "";
      document.getElementById("goalInput").value = "";
      setStatus("출발지를 클릭하세요.");
      document.getElementById("summary").innerHTML = "";
      document.getElementById("signalList").innerHTML = "";
    });

    document.getElementById("startNavBtn").addEventListener("click", startNav);
    document.getElementById("stopNavBtn").addEventListener("click", stopNav);
    document.getElementById("previewBtn").addEventListener("click", () => {
      if (currentRoutePoints.length === 0) { alert("먼저 지도를 클릭해 경로를 탐색하세요."); return; }
      if (!view3dEl.classList.contains('pip-main')) swapPiP();
      progressM = 0;
      navMode = 'preview';
    });

    function clearRoute() {
      if (routePolyline) { map.removeLayer(routePolyline); routePolyline = null; }
      signalMarkers.forEach(m => map.removeLayer(m));
      signalMarkers = [];
      currentRoutePoints = [];
      currentMatchedSignals = [];
      clearScene3d();
    }

    function setStatus(msg) {
      document.getElementById("status").textContent = msg;
    }

    async function findRoute() {
      clearRoute();
      setStatus("경로 탐색 중...");
      try {
        const res = await fetch("https://apis.openapi.sk.com/tmap/routes/pedestrian?version=1", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json",
            "appKey": TMAP_APP_KEY,
          },
          body: JSON.stringify({
            startX: String(start.lng), startY: String(start.lat),
            endX: String(goal.lng), endY: String(goal.lat),
            startName: "출발지", endName: "도착지",
            reqCoordType: "WGS84GEO", resCoordType: "WGS84GEO",
            searchOption: "0",
          }),
        });
        const data = await res.json();
        if (!res.ok || !data.features) {
          setStatus("경로를 찾지 못했습니다: " + (data.error?.message || JSON.stringify(data)));
          return;
        }
        renderRoute(data);
      } catch (e) {
        console.error(e);
        setStatus("경로 탐색 실패 (네트워크 오류)");
      }
    }

    // Tmap GeoJSON -> [{lat, lng, cumDist}] 좌표열 생성
    function buildRoutePoints(geojson) {
      const coords = []; // [lng, lat]
      geojson.features.forEach(f => {
        if (f.geometry && f.geometry.type === "LineString") {
          f.geometry.coordinates.forEach(c => coords.push(c));
        }
      });
      const points = [];
      let cumDist = 0;
      coords.forEach((c, i) => {
        const [lng, lat] = c;
        if (i > 0) {
          const prev = coords[i - 1];
          cumDist += haversine(prev[1], prev[0], lat, lng);
        }
        points.push({ lat, lng, cumDist });
      });
      return points;
    }

    function matchSignalsToRoute(routePoints, thresholdMeters) {
      const matched = [];
      signals.forEach(sig => {
        let best = null;
        routePoints.forEach(p => {
          const d = haversine(sig.lat, sig.lng, p.lat, p.lng);
          if (!best || d < best.dist) best = { dist: d, cumDist: p.cumDist };
        });
        if (best && best.dist <= thresholdMeters) {
          matched.push({ sig, cumDist: best.cumDist, dist: best.dist });
        }
      });
      matched.sort((a, b) => a.cumDist - b.cumDist);
      const dedup = [];
      matched.forEach(m => {
        const dup = dedup.find(d => haversine(d.sig.lat, d.sig.lng, m.sig.lat, m.sig.lng) < 15);
        if (!dup) dedup.push(m);
      });
      return dedup;
    }

    function renderRoute(geojson) {
      const routePoints = buildRoutePoints(geojson);
      if (routePoints.length === 0) { setStatus("경로 좌표가 비어 있습니다."); return; }
      currentRoutePoints = routePoints;

      const path = routePoints.map(p => [p.lat, p.lng]);
      routePolyline = L.polyline(path, { color: '#1a73e8', opacity: 0.85, weight: 5 }).addTo(map);
      map.fitBounds(routePolyline.getBounds());

      const totalDistance = routePoints[routePoints.length - 1].cumDist;
      const walkSpeed = Math.max(0.3, Number(document.getElementById("walkSpeed").value) || 1.2);
      const totalWalkTime = totalDistance / walkSpeed;

      const matched = matchSignalsToRoute(routePoints, 40);
      currentMatchedSignals = matched;
      const now = new Date();
      let extraDelay = 0;
      matched.forEach(m => {
        const walkTimeToHere = m.cumDist / walkSpeed;
        const arrivalTime = new Date(now.getTime() + (walkTimeToHere + extraDelay) * 1000);
        const predicted = getSignalState(m.sig.cycle, calibrations[m.sig.id], arrivalTime);
        if (predicted.state === "빨강") {
          extraDelay += predicted.remaining;
        }
        m.predicted = predicted;
        m.arrivalTime = arrivalTime;

        const icon = predicted.state === "초록"
          ? "https://maps.gstatic.com/mapfiles/ms2/micons/green-dot.png"
          : "https://maps.gstatic.com/mapfiles/ms2/micons/red-dot.png";
        const marker = L.marker([m.sig.lat, m.sig.lng], {
          icon: L.icon({ iconUrl: icon, iconSize: [20, 20], iconAnchor: [10, 10] }),
          title: m.sig.name
        }).addTo(map);
        signalMarkers.push(marker);
      });

      // ---- 3D 씬 구성: 원점 설정, 경로, 신호 마커, 건물/도로(비동기) ----
      originLat = routePoints[0].lat;
      originLng = routePoints[0].lng;
      buildRouteMesh3d(routePoints);
      buildSignalMarkers3d(matched);
      loadEnvironmentForRoute(routePoints);
      // 카메라는 출발지에 정지 상태로 배치만 한다 — 실제로 움직이는 건 GPS 내비게이션(startNav)
      // 또는 "3D 미리보기" 버튼(테스트/시연용 자동재생)을 눌렀을 때뿐이다.
      positionCameraAt(routePoints[0].lat, routePoints[0].lng, 0);
      navMode = 'idle';

      const totalETA = totalWalkTime + extraDelay;
      document.getElementById("summary").innerHTML = `
        <div class="summary">
          총 거리: ${Math.round(totalDistance)}m<br>
          도보 시간: ${Math.round(totalWalkTime / 60)}분<br>
          예상 신호대기: ${Math.round(extraDelay)}초<br>
          <b>총 예상 소요시간: ${Math.round(totalETA / 60)}분 ${Math.round(totalETA % 60)}초</b>
        </div>
      `;

      document.getElementById("signalList").innerHTML =
        `<h3>경로상 신호 (${matched.length}개)</h3>` +
        matched.map(m => {
          const cls = m.predicted.state === "초록" ? "green" : "red";
          const badgeCls = m.predicted.source === "calibrated" ? "calibrated" : "estimated";
          const badgeLabel = m.predicted.source === "calibrated" ? "실측" : "추정";
          const etaMin = Math.round(m.cumDist / walkSpeed / 60 * 10) / 10;
          return `
            <div class="sig-item ${cls}">
              <b>${m.sig.name}</b> <span class="badge ${badgeCls}">${badgeLabel}</span><br>
              도착 예상: ${etaMin}분 후<br>
              예측 신호: <b style="color:${cls === 'green' ? 'green' : 'red'}">${m.predicted.state}</b>
              (${m.predicted.remaining}초 남음)
            </div>
          `;
        }).join("");

      if (matched.length === 0) {
        setStatus("경로 완성 (경로 40m 이내 신호 데이터 없음)");
      } else {
        setStatus("경로 완성");
      }
    }

    // ---- 실시간 내비게이션(GPS로 카메라 추적 + 근접 신호 HUD 자동표시) ----
    function nearestRouteProgress(lat, lng) {
      let best = null;
      currentRoutePoints.forEach((p, i) => {
        const d = haversine(lat, lng, p.lat, p.lng);
        if (!best || d < best.dist) best = { dist: d, cumDist: p.cumDist, index: i };
      });
      return best;
    }

    function startNav() {
      if (!navigator.geolocation) { alert("위치 정보를 사용할 수 없습니다."); return; }
      if (currentRoutePoints.length === 0) { alert("먼저 지도를 클릭해 경로를 탐색하세요."); return; }
      document.getElementById("startNavBtn").style.display = "none";
      document.getElementById("stopNavBtn").style.display = "inline-block";
      if (!view3dEl.classList.contains('pip-main')) swapPiP();
      navMode = 'live';
      watchId = navigator.geolocation.watchPosition(onNavPosition, err => {
        console.error("GPS 오류:", err);
      }, { enableHighAccuracy: true });
    }

    function stopNav() {
      if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
      document.getElementById("startNavBtn").style.display = "inline-block";
      document.getElementById("stopNavBtn").style.display = "none";
      hudEl.style.display = "none";
      navMode = 'idle';
    }

    function onNavPosition(pos) {
      const { latitude: lat, longitude: lng } = pos.coords;
      const progress = nearestRouteProgress(lat, lng);
      if (!progress) return;
      positionCameraAt(lat, lng, progress.cumDist);
    }

    // ---- AR 모드: 카메라 화면 위에 경로/신호를 겹쳐 표시(센서 기반, SLAM 아님) ----
    // 위치는 GPS(watchPosition, 위 onNavPosition과 동일 경로 재사용), 시선 방향은 나침반(좌우 회전)만 반영.
    // 기울임(beta/gamma)·고정 하향각 등을 추가해봤지만 실기기에서 좌우 반전+불안정 문제가 생겨
    // 전부 걷어내고 최초의 단순 버전(수평 시선만)으로 되돌림 — 가장 안정적이었던 상태.
    function updateCompassHeading(e) {
      let heading = null;
      if (typeof e.webkitCompassHeading === 'number') {
        heading = e.webkitCompassHeading; // iOS: 0=북, 시계방향 값 그대로 사용
      } else if (e.absolute && typeof e.alpha === 'number') {
        heading = (360 - e.alpha) % 360; // Android(절대방위 이벤트)
      }
      if (heading === null) return;
      camera3d.rotation.set(0, -heading * Math.PI / 180, 0); // 수평 시선만 반영(단순화)
    }

    function startCompass() {
      compassHandler = updateCompassHeading;
      const evName = 'ondeviceorientationabsolute' in window ? 'deviceorientationabsolute' : 'deviceorientation';
      window.addEventListener(evName, compassHandler);
    }

    function stopCompass() {
      if (!compassHandler) return;
      window.removeEventListener('deviceorientationabsolute', compassHandler);
      window.removeEventListener('deviceorientation', compassHandler);
      compassHandler = null;
    }

    async function startAR() {
      if (currentRoutePoints.length === 0) { alert("먼저 지도를 클릭해 경로를 탐색하세요."); return; }
      try {
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
          const perm = await DeviceOrientationEvent.requestPermission(); // iOS는 사용자 제스처 안에서 호출 필수
          if (perm !== 'granted') { alert("방향센서 권한이 필요합니다."); return; }
        }
        arStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
      } catch (e) {
        console.error("AR 시작 실패:", e);
        alert("카메라 또는 방향센서 권한을 허용해야 AR 모드를 사용할 수 있습니다.");
        return;
      }
      const video = document.getElementById('arVideo');
      video.srcObject = arStream;
      video.style.display = 'block';
      arMode = true;
      scene3d.background = null;
      renderer3d.setClearColor(0x000000, 0);
      startCompass();
      if (!view3dEl.classList.contains('pip-main')) swapPiP();
      document.getElementById("arBtn").style.display = "none";
      document.getElementById("arStopBtn").style.display = "inline-block";
      if (watchId === null) startNav(); // GPS 위치추적이 아직 없으면 같이 시작
    }

    function stopAR() {
      arMode = false;
      if (arStream) { arStream.getTracks().forEach(t => t.stop()); arStream = null; }
      const video = document.getElementById('arVideo');
      video.style.display = 'none';
      video.srcObject = null;
      scene3d.background = new THREE.Color(0x8fc7ff);
      renderer3d.setClearColor(0x8fc7ff, 1);
      stopCompass();
      document.getElementById("arBtn").style.display = "inline-block";
      document.getElementById("arStopBtn").style.display = "none";
    }

    document.getElementById("arBtn").addEventListener("click", startAR);
    document.getElementById("arStopBtn").addEventListener("click", stopAR);

    initThree();
    loadData().then(() => {
      setStatus("출발지를 클릭하세요.");
      initCalibrationSync(remote => { calibrations = remote; });
    });
  </script>
</body>
</html>
