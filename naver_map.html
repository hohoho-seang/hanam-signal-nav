<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
  <title>하남시 보행신호등 지도</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
  <script src="config.js"></script>
  <script src="signal.js"></script>
  <style>
    html, body { margin: 0; }
    #map { width: 100%; height: 900px; }
    .cal-form { padding: 8px; font-size: 13px; }
    .cal-form button { margin: 2px; padding: 4px 8px; }
    .cal-badge { font-size: 11px; padding: 1px 6px; border-radius: 8px; color: #fff; }
    .cal-badge.calibrated { background: #1a73e8; }
    .cal-badge.estimated { background: #999; }
    .cal-sample { font-size: 11px; color: #555; }

    #proximityBanner {
      position: fixed; top: 0; left: 0; right: 0; z-index: 2000;
      display: none; background: #1a73e8; color: #fff;
      font-size: 14px; box-shadow: 0 2px 8px rgba(0,0,0,.25);
    }
    .banner-prompt { padding: 10px 14px; cursor: pointer; }
    .banner-quick { padding: 10px 14px 14px; background: #fff; color: #222; }
    .banner-quick-title { font-weight: bold; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
    .banner-close { cursor: pointer; font-size: 16px; color: #888; padding: 0 4px; }
    .banner-quick-slider { margin: 10px 0; font-size: 13px; }
    .banner-quick-slider input[type=range] { width: 100%; }
    .banner-quick-bucket { margin-bottom: 10px; font-size: 13px; }
    .banner-quick-buttons { display: flex; gap: 10px; }
    .big-btn {
      flex: 1; padding: 16px 0; font-size: 16px; font-weight: bold; border: none;
      border-radius: 10px; color: #fff; cursor: pointer;
    }
    .big-btn.green { background: #1a9c1a; }
    .big-btn.red { background: #d92b2b; }
    .banner-thanks { padding: 12px 14px; background: #1a9c1a; color: #fff; font-size: 14px; }
  </style>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon-precomposed" sizes="144x144" href="image/apple-touch-icon-144x144.png" />
  <link rel="apple-touch-icon-precomposed" sizes="152x152" href="image/apple-touch-icon-152x152.png" />
  <meta name="application-name" content="&nbsp;"/>
</head>
<body>
  <div id="proximityBanner"></div>
  <div id="map"></div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js')
        .then(() => console.log('Service Worker Registered'))
        .catch(err => console.error('Service Worker 등록 실패:', err));
    }

    const map = L.map('map').setView([37.55060183, 127.2143176], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 19
    }).addTo(map);

    const markers = []; // { sig, marker }
    let calibrations = loadCalibrations(); // 이 브라우저(localStorage)에 저장된 보정값
    let allSignals = []; // boot()에서 채워짐(근접 배너 탐색용)

    function timeBucketOptions(selected) {
      return Object.keys(TIME_BUCKET_LABELS).map(k =>
        `<option value="${k}" ${k === selected ? 'selected' : ''}>${TIME_BUCKET_LABELS[k]}</option>`
      ).join('');
    }

    function infoContent(sig) {
      // 주기 미상(표준데이터에 위치만 있고 신호시간이 비어있는 지점): 카운트다운/보정 불가 안내만.
      if (!hasCycle(sig.cycle)) {
        return `
          <div style="line-height:1.4; font-size:13px; min-width:200px;">
            <b>${sig.name}</b> <span class="cal-badge estimated">주기 미상</span><br>
            보행신호등 위치만 등록된 지점입니다.<br>
            <span style="color:#888;">신호 주기(초록/빨강 길이)를 실측하면 카운트다운을 제공할 수 있어요.</span>
          </div>
        `;
      }
      const { state, remaining, source, calibratedAt, sampleCount } = getSignalState(sig.cycle, calibrations[sig.id]);
      const badge = source === 'calibrated'
        ? `<span class="cal-badge calibrated">${calibrationAgeLabel(calibratedAt)}</span>`
        : `<span class="cal-badge estimated">추정치(미보정)</span>`;
      const sampleLabel = sampleCount >= 1 ? `<div class="cal-sample">${sampleCount}명이 확인함</div>` : '';
      const c = normalizeCycle(sig.cycle);
      const officialLabel = sig.official
        ? `<div class="cal-sample">공식 주기: 초록 ${sig.official.green}초 / 빨강 ${sig.official.red}초</div>`
        : (sig.source === 'crosswalk-standard-data' ? `<div class="cal-sample">공식 데이터 주기(초록 ${c.green}초/빨강 ${c.red}초)</div>` : '');
      return `
        <div style="line-height:1.4; font-size:13px; min-width:200px;">
          <b>${sig.name}</b> ${badge}<br>
          현재 신호: <span style="color:${state==="초록" ? "green":"red"}">${state}</span><br>
          남은 시간: ${remaining}초
          ${sampleLabel}
          ${officialLabel}
          <div class="cal-form">
            지금 이 신호를 보고 계신가요?<br>
            <button onclick="openCalibrateForm('${sig.id}')">지금 신호 알려주기</button>
            <div id="calform-${sig.id}"></div>
          </div>
        </div>
      `;
    }

    function openCalibrateForm(id) {
      const el = document.getElementById(`calform-${id}`);
      if (!el) return;
      el.innerHTML = `
        <div style="margin-top:6px;">
          상태:
          <select id="calstate-${id}">
            <option value="green">초록</option>
            <option value="red">빨강</option>
          </select>
          잔여초: <input id="calremain-${id}" type="number" min="0" style="width:50px;" value="0">
          시간대:
          <select id="caltime-${id}">${timeBucketOptions(suggestTimeBucket())}</select>
          <button onclick="submitCalibration('${id}')">전송</button>
        </div>
      `;
    }

    function submitCalibration(id) {
      const sig = markers.find(m => m.sig.id === id)?.sig || allSignals.find(s => s.id === id);
      if (!sig) return;
      const state = document.getElementById(`calstate-${id}`).value;
      const remaining = Number(document.getElementById(`calremain-${id}`).value);
      const timeBucket = document.getElementById(`caltime-${id}`).value;
      saveCalibration(id, sig.cycle, state, remaining, timeBucket).then(entry => {
        calibrations[id] = entry;
        refreshMarker(id);
        const shared = typeof firestoreDb !== 'undefined' && firestoreDb;
        alert(shared
          ? `보정 완료! 다른 사용자에게도 실시간으로 공유됩니다. (${entry.sampleCount}명이 확인함)`
          : '보정 완료! 이 기기에서는 이제 실측 기준으로 표시됩니다. (공유 서버 미설정 — 이 기기에만 저장)');
      }).catch(err => {
        console.error('보정 저장 실패:', err);
        alert('보정 저장에 실패했습니다. 다시 시도해주세요.');
      });
    }

    // ---- 크라우드소싱 참여 장벽 낮추기: 근처에 미보정 신호가 있으면 배너로 1탭 제보 유도 ----
    const NEARBY_RADIUS_M = 100;
    let bannerSig = null;

    function haversineDistance(lat1, lon1, lat2, lon2) {
      const toRad = d => d * Math.PI / 180;
      const R = 6371000;
      const dLat = toRad(lat2 - lat1), dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
      return 2 * R * Math.asin(Math.sqrt(a));
    }

    function findNearbyUncalibratedSignal(lat, lng) {
      let best = null;
      allSignals.forEach(sig => {
        if (!hasCycle(sig.cycle)) return; // 주기 미상은 위상 보정 자체가 불가(주기를 알아야 역산 가능)
        const { source } = getSignalState(sig.cycle, calibrations[sig.id]);
        if (source !== 'estimated') return; // 이미 실측 기반이면 굳이 재요청하지 않음
        const d = haversineDistance(lat, lng, sig.lat, sig.lng);
        if (d <= NEARBY_RADIUS_M && (!best || d < best.dist)) best = { sig, dist: d };
      });
      return best ? best.sig : null;
    }

    function requestProximityPrompt() {
      if (!navigator.geolocation) return; // 미지원 브라우저는 조용히 건너뜀
      navigator.geolocation.getCurrentPosition(pos => {
        const nearby = findNearbyUncalibratedSignal(pos.coords.latitude, pos.coords.longitude);
        if (nearby) showProximityBanner(nearby);
      }, err => {
        console.warn('위치 권한 거부/실패 — 근접 배너 기능만 비활성화, 나머지 기능은 정상 동작:', err);
      }, { timeout: 8000, maximumAge: 60000 });
    }

    function showProximityBanner(sig) {
      bannerSig = sig;
      const el = document.getElementById('proximityBanner');
      el.style.display = 'block';
      el.innerHTML = `
        <div class="banner-prompt" onclick="expandProximityBanner()">
          📍 지금 <b>${sig.name}</b> 신호가 보이시나요? 1탭으로 정확도를 높여주세요 ▸
        </div>
      `;
    }

    function expandProximityBanner() {
      if (!bannerSig) return;
      const c = normalizeCycle(bannerSig.cycle);
      const total = c.green + c.red;
      const el = document.getElementById('proximityBanner');
      el.innerHTML = `
        <div class="banner-quick">
          <div class="banner-quick-title">
            ${bannerSig.name} — 지금 신호는?
            <span class="banner-close" onclick="closeProximityBanner()">✕</span>
          </div>
          <div class="banner-quick-slider">
            남은 시간: <span id="quickRemainVal">5</span>초
            <input id="quickRemainSlider" type="range" min="0" max="${total}" value="5"
              oninput="document.getElementById('quickRemainVal').textContent=this.value">
          </div>
          <div class="banner-quick-bucket">
            시간대: <select id="quickTimeBucket">${timeBucketOptions(suggestTimeBucket())}</select>
          </div>
          <div class="banner-quick-buttons">
            <button class="big-btn green" onclick="quickSubmit('green')">🟢 지금 초록</button>
            <button class="big-btn red" onclick="quickSubmit('red')">🔴 지금 빨강</button>
          </div>
        </div>
      `;
    }

    function quickSubmit(state) {
      const sig = bannerSig;
      if (!sig) return;
      const remaining = Number(document.getElementById('quickRemainSlider').value);
      const timeBucket = document.getElementById('quickTimeBucket').value;
      saveCalibration(sig.id, sig.cycle, state, remaining, timeBucket).then(entry => {
        calibrations[sig.id] = entry;
        refreshMarker(sig.id);
        showProximityThanks(entry);
      }).catch(err => {
        console.error('보정 저장 실패:', err);
        alert('보정 저장에 실패했습니다. 다시 시도해주세요.');
      });
    }

    function showProximityThanks(entry) {
      const el = document.getElementById('proximityBanner');
      const n = entry.sampleCount || 1;
      el.innerHTML = `<div class="banner-thanks">감사합니다! 실측 기반으로 전환됨 · ${n}명이 확인함</div>`;
      setTimeout(closeProximityBanner, 3000);
    }

    function closeProximityBanner() {
      const el = document.getElementById('proximityBanner');
      el.style.display = 'none';
      el.innerHTML = '';
      bannerSig = null;
    }

    function refreshMarker(id) {
      const obj = markers.find(m => m.sig.id === id);
      if (!obj) return;
      const { state } = getSignalState(obj.sig.cycle, calibrations[id]);
      obj.marker.setIcon(iconFor(state));
      if (obj.marker.isPopupOpen()) {
        obj.marker.setPopupContent(infoContent(obj.sig));
      }
    }

    function iconFor(state) {
      // 초록/빨강 = 카운트다운 가능, 노랑 = 주기 미상(위치만 등록)
      const url = state === "초록"
        ? "https://maps.gstatic.com/mapfiles/ms2/micons/green-dot.png"
        : state === "빨강"
          ? "https://maps.gstatic.com/mapfiles/ms2/micons/red-dot.png"
          : "https://maps.gstatic.com/mapfiles/ms2/micons/yellow-dot.png";
      return L.icon({ iconUrl: url, iconSize: [24, 24], iconAnchor: [12, 12] });
    }

    async function boot() {
      const signalsRes = await fetch("signals.json", { cache: "no-cache" });
      if (!signalsRes.ok) throw new Error("HTTP " + signalsRes.status);
      const signals = await signalsRes.json();

      if (!Array.isArray(signals)) throw new Error("signals.json 형식 오류: 배열 아님");

      // 좌표만 있으면 표시한다 — cycle이 null(주기 미상)인 신호도 위치는 보여주고
      // 팝업에서 "주기 미상"으로 안내(하남 전체 확장으로 이런 지점이 다수 생김).
      const valid = signals.filter(s => s && Number.isFinite(s.lat) && Number.isFinite(s.lng));
      if (valid.length === 0) throw new Error("유효한 신호등 데이터 없음");
      allSignals = valid;

      // 수백 개 이상이면 개별 마커는 너무 무거움 — 클러스터링(CDN 로드 실패시 일반 레이어로 폴백)
      const layer = (typeof L.markerClusterGroup === 'function')
        ? L.markerClusterGroup({ disableClusteringAtZoom: 17, maxClusterRadius: 60 })
        : L.layerGroup();

      valid.forEach(sig => {
        const { state } = getSignalState(sig.cycle, calibrations[sig.id]);
        const marker = L.marker([sig.lat, sig.lng], { icon: iconFor(state), title: sig.name });
        marker.bindPopup(infoContent(sig));
        marker.on('popupopen', () => marker.setPopupContent(infoContent(sig)));
        layer.addLayer(marker);
        markers.push({ sig, marker });
      });
      map.addLayer(layer);

      setInterval(() => {
        // 수천 개 마커에 매초 setIcon을 전부 호출하면 무거움 — 상태가 실제로 바뀐 것만 갱신.
        markers.forEach(obj => {
          const { state } = getSignalState(obj.sig.cycle, calibrations[obj.sig.id]);
          if (obj.lastState !== state) {
            obj.lastState = state;
            obj.marker.setIcon(iconFor(state));
          }
          if (obj.marker.isPopupOpen()) {
            obj.marker.setPopupContent(infoContent(obj.sig));
          }
        });
      }, 1000);
    }

    boot().then(() => {
      requestProximityPrompt();
      initCalibrationSync(remote => {
        calibrations = remote;
        markers.forEach(obj => {
          const { state } = getSignalState(obj.sig.cycle, calibrations[obj.sig.id]);
          obj.marker.setIcon(iconFor(state));
          if (obj.marker.isPopupOpen()) {
            obj.marker.setPopupContent(infoContent(obj.sig));
          }
        });
      });
    }).catch(err => {
      console.error("초기화 실패:", err);
      alert("데이터를 불러오지 못했습니다. (콘솔 확인)");
    });
  </script>
</body>
</html>
